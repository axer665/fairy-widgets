services:
  proxy:
    build: ./proxy
    ports:
      - "8080:80"
    volumes:
      # Изменения конфига: перезапуск прокси — docker compose restart proxy
      - ./proxy/httpd-vhosts.conf:/usr/local/apache2/conf/extra/httpd-vhosts.conf:ro
    depends_on:
      - backend
      - fe-client
      - fe-moderator
    networks:
      - app

  backend:
    build: ./backend
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_NAME: widget_app
      DB_USER: widget
      DB_PASSWORD: widget_secret
      JWT_SECRET: change_me_in_production_use_long_random_string
      APP_URL: http://localhost:8080
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: widget_app
      MYSQL_USER: widget
      MYSQL_PASSWORD: widget_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  # Dev: исходники с хоста + nuxt dev (HMR). Том node_modules — чтобы не затирать зависимости биндом.
  fe-client:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./fe-client:/app
      - fe_client_node_modules:/app/node_modules
    command: >
      sh -c "test -d node_modules/nuxt || npm install;
      npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      NUXT_PUBLIC_API_BASE: ""
      # HMR через bind-mount в Docker (особенно Mac/Windows)
      NUXT_DOCKER_DEV: "1"
      # Должен совпадать с тем, как открываете сайт в браузере (localhost vs 127.0.0.1)
      NUXT_DEV_ORIGIN: http://localhost:8080
    depends_on:
      - backend
    networks:
      - app

  fe-moderator:
    build: ./fe-moderator
    volumes:
      - ./fe-moderator:/usr/share/nginx/html:ro
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mysql_data:
  fe_client_node_modules:
