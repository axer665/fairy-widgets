Listen 443

ProxyRequests Off
ProxyPreserveHost On

# Общие настройки TLS (Apache 2.4)
SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
SSLSessionCache "shmcb:/usr/local/apache2/logs/ssl_scache(512000)"
SSLSessionCacheTimeout 300

# HTTP → HTTPS
<VirtualHost *:80>
  ServerName localhost

  RewriteEngine On
  RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L,QSA,NE]
</VirtualHost>

# Основной трафик (HTTPS)
<VirtualHost *:443>
  ServerName localhost

  SSLEngine on
  # Сертификат домена; ключ; цепочка УЦ (промежуточный(е) + корневой) — см. ssl/README.md
  SSLCertificateFile "/usr/local/apache2/conf/ssl/mylittlefairy.crt"
  SSLCertificateKeyFile "/usr/local/apache2/conf/ssl/mylittlefairy.key"
  SSLCertificateChainFile "/usr/local/apache2/conf/ssl/chain.crt"

  # Пути Vite (@id/virtual:..., %2F) без порчи прокси
  AllowEncodedSlashes NoDecode

  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Ssl "on"

  RewriteEngine On

  # Виджет: <script src="/ ?token=..."> — GET / с query token → PHP отдаёт JS
  RewriteCond %{REQUEST_METHOD} =GET
  RewriteCond %{REQUEST_URI} ^/$
  RewriteCond %{QUERY_STRING} (^|&)token=[^&]+
  RewriteRule ^ http://backend:80/widget-loader [P,QSA,L]

  # Виджет: JS и статика с PHP-бэкенда (иначе Nuxt отдаёт 404)
  ProxyPass /widget-loader http://backend:80/widget-loader
  ProxyPassReverse /widget-loader http://backend:80/widget-loader
  ProxyPass /widget/ http://backend:80/widget/
  ProxyPassReverse /widget/ http://backend:80/widget/

  ProxyPass /api http://backend:80/api
  ProxyPassReverse /api http://backend:80/api

  ProxyPass /moderator/ http://fe-moderator:80/
  ProxyPassReverse /moderator/ http://fe-moderator:80/

  # Vite / Nuxt dev: WebSocket HMR
  RewriteCond %{HTTP:Upgrade} =websocket [NC]
  RewriteCond %{HTTP:Connection} upgrade [NC]
  RewriteRule ^/(.*)$ ws://fe-client:3000/$1 [P,L]

  # nocanon — не нормализовать URI (важно для /@id/virtual:... и %)
  ProxyPass / http://fe-client:3000/ nocanon
  ProxyPassReverse / http://fe-client:3000/
</VirtualHost>
