services:
  proxy:
    build: ./proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Изменения конфига: перезапуск прокси — docker compose restart proxy
      - ./proxy/httpd-vhosts.conf:/usr/local/apache2/conf/extra/httpd-vhosts.conf:ro
      # Сертификаты: см. ssl/README.md (mylittlefairy.crt, mylittlefairy.key, chain.crt)
      - ./ssl:/usr/local/apache2/conf/ssl:ro
    depends_on:
      - backend
      - fe-client
      - fe-moderator
    networks:
      - app

  backend:
    build: ./backend
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE:-widget_app}
      DB_USER: ${MYSQL_USER:-widget}
      DB_PASSWORD: ${MYSQL_PASSWORD:-widget_secret}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_use_long_random_string}
      APP_URL: ${PUBLIC_BASE_URL:-https://localhost}
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-widget_app}
      MYSQL_USER: ${MYSQL_USER:-widget}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-widget_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-root_secret}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  # Веб-интерфейс к MySQL: http://localhost:${PHPMYADMIN_PORT:-8081} (логин — widget или root из .env)
  phpmyadmin:
    image: phpmyadmin:5.2
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: ${PHPMYADMIN_ABSOLUTE_URI:-http://localhost:8081/}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  # Dev: исходники с хоста + nuxt dev (HMR). Том node_modules — чтобы не затирать зависимости биндом.
  fe-client:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./fe-client:/app
      - fe_client_node_modules:/app/node_modules
    command: >
      sh -c "test -d node_modules/nuxt || npm install;
      npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      NUXT_PUBLIC_API_BASE: ""
      # HMR через bind-mount в Docker (особенно Mac/Windows)
      NUXT_DOCKER_DEV: "1"
      # Публичный URL (должен совпадать с тем, как открываете сайт, и с TLS)
      NUXT_DEV_ORIGIN: ${PUBLIC_BASE_URL:-https://localhost}
    depends_on:
      - backend
    networks:
      - app

  fe-moderator:
    build: ./fe-moderator
    volumes:
      - ./fe-moderator:/usr/share/nginx/html:ro
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mysql_data:
  fe_client_node_modules:
