ServerName localhost

ProxyRequests Off
ProxyPreserveHost On

<VirtualHost *:80>
  ServerName localhost

  # Пути Vite (@id/virtual:..., %2F) без порчи прокси
  AllowEncodedSlashes NoDecode

  RewriteEngine On

  # Виджет: <script src="/ ?token=..."> — GET / с query token → PHP отдаёт JS
  RewriteCond %{REQUEST_METHOD} =GET
  RewriteCond %{REQUEST_URI} ^/$
  RewriteCond %{QUERY_STRING} (^|&)token=[^&]+
  RewriteRule ^ http://backend:80/widget-loader [P,QSA,L]

  ProxyPass /api http://backend:80/api
  ProxyPassReverse /api http://backend:80/api

  ProxyPass /moderator/ http://fe-moderator:80/
  ProxyPassReverse /moderator/ http://fe-moderator:80/

  # Vite / Nuxt dev: WebSocket HMR
  RewriteCond %{HTTP:Upgrade} =websocket [NC]
  RewriteCond %{HTTP:Connection} upgrade [NC]
  RewriteRule ^/(.*)$ ws://fe-client:3000/$1 [P,L]

  # nocanon — не нормализовать URI (важно для /@id/virtual:... и %)
  ProxyPass / http://fe-client:3000/ nocanon
  ProxyPassReverse / http://fe-client:3000/
</VirtualHost>
